name: CI Checks

on:
  push:
    branches-ignore:
      - windows-native-smoke
    paths:
      - "**.v"
      - "**.vsh"
      - "**.c"
      - "**.h"
      - "**.m"
      - "**.md"
      - "**/ci.yml"
  pull_request:
    branches-ignore:
      - windows-native-smoke
    paths:
      - "**.v"
      - "**.vsh"
      - "**.c"
      - "**.h"
      - "**.m"
      - "**.md"
      - "**/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  V_VERSION: 0.5.1

jobs:
  linting:
    # Temporary smoke-branch acceleration: Ubuntu/macOS jobs are skipped on
    # windows-native-smoke. Re-enable full CI before final validation/merge.
    if: github.ref != 'refs/heads/windows-native-smoke' && github.base_ref != 'windows-native-smoke' && github.head_ref != 'windows-native-smoke'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VFLAGS: -no-parallel
    steps:
      - name: Install V
        shell: bash
        run: |
          asset="v_linux.zip"
          curl -L --fail --retry 3 -o "$asset" "https://github.com/vlang/v/releases/download/${V_VERSION}/${asset}"
          unzip -q "$asset"
          chmod +x "$PWD/v/v"
          echo "$PWD/v" >> "$GITHUB_PATH"
      - name: Verify V version
        shell: bash
        run: |
          v_version="$(v version)"
          echo "$v_version"
          case "$v_version" in
            *"$V_VERSION"*) ;;
            *)
              echo "Expected V version $V_VERSION"
              exit 1
              ;;
          esac
      - name: Install vglyph
        run: v install vglyph
      - name: Install C development dependencies (headers and libs)
        if: runner.os == 'Linux'
        run: v retry -- sudo apt -qq update && v retry -- sudo apt install libpango1.0-dev libfontconfig1-dev libfribidi-dev libharfbuzz-dev libfreetype-dev libgl1-mesa-dri xvfb libxcursor-dev libxi-dev libxrandr-dev freeglut3-dev dbus libdbus-1-dev libdbus-glib-1-2 libdbus-glib-1-dev
      - name: Install development dependencies on macos (headers and libs)
        if: runner.os == 'macOS'
        run: v retry -- brew install pango harfbuzz freetype2
      - name: Checkout the gui module
        uses: actions/checkout@v4
        with:
          path: gui
      - name: Verify formatting
        run: v fmt -verify -inprocess gui/
      - name: Check formatting of MD files
        run: v check-md gui/
      - name: Check syntax of examples
        run: v gui/examples/_check.vsh

  compiling:
    # Temporary smoke-branch acceleration: Ubuntu/macOS jobs are skipped on
    # windows-native-smoke. Re-enable full CI before final validation/merge.
    if: github.ref != 'refs/heads/windows-native-smoke' && github.base_ref != 'windows-native-smoke' && github.head_ref != 'windows-native-smoke'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: true
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    env:
      VFLAGS: -no-parallel
    steps:
      - name: Install V
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)
              asset="v_linux.zip"
              ;;
            macOS)
              if [ "$(uname -m)" = "arm64" ]; then
                asset="v_macos_arm64.zip"
              else
                asset="v_macos_x86_64.zip"
              fi
              ;;
            *)
              echo "Unsupported runner OS: ${{ runner.os }}"
              exit 1
              ;;
          esac
          curl -L --fail --retry 3 -o "$asset" "https://github.com/vlang/v/releases/download/${V_VERSION}/${asset}"
          unzip -q "$asset"
          chmod +x "$PWD/v/v"
          echo "$PWD/v" >> "$GITHUB_PATH"
      - name: Verify V version
        shell: bash
        run: |
          v_version="$(v version)"
          echo "$v_version"
          case "$v_version" in
            *"$V_VERSION"*) ;;
            *)
              echo "Expected V version $V_VERSION"
              exit 1
              ;;
          esac
      - name: Install vglyph
        run: v install vglyph
      - name: Install X11/GL development dependencies (headers and libs)
        if: runner.os == 'Linux'
        run: v retry -- sudo apt -qq update && v retry -- sudo apt install libpango1.0-dev libfontconfig1-dev libfribidi-dev libharfbuzz-dev libfreetype-dev libgl1-mesa-dri xvfb libxcursor-dev libxi-dev libxrandr-dev freeglut3-dev dbus libdbus-1-dev libdbus-glib-1-2 libdbus-glib-1-dev
      - name: Install development dependencies on macos (headers and libs)
        if: runner.os == 'macOS'
        run: v retry -- brew install pango harfbuzz freetype2
      - name: Checkout the gui module
        uses: actions/checkout@v4
        with:
          path: gui
      - name: Run tests
        run: v -cc clang test gui/
      - name: Check compilation of examples
        run: v -cc clang should-compile-all gui/examples/
      - name: Check compilation of examples with -W
        run: v -cc clang gui/examples/_build.vsh

  compiling-on-windows:
    if: github.ref != 'refs/heads/windows-native-smoke' && github.base_ref != 'windows-native-smoke' && github.head_ref != 'windows-native-smoke'
    runs-on: windows-latest
    timeout-minutes: 25
    env:
      VFLAGS: -no-parallel
    steps:
      - name: Install V
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $asset = 'v_windows.zip'
          $url = "https://github.com/vlang/v/releases/download/$env:V_VERSION/$asset"
          Invoke-WebRequest -Uri $url -OutFile $asset
          Expand-Archive -Path $asset -DestinationPath . -Force
          $vPath = (Resolve-Path .\v).Path
          Add-Content -Path $env:GITHUB_PATH -Value $vPath
      - name: Verify V version
        shell: pwsh
        run: |
          $vVersion = v version
          Write-Host $vVersion
          if ($vVersion -notlike "*$env:V_VERSION*") {
            throw "Expected V version $env:V_VERSION"
          }
      - name: Install pango and freetype
        run: vcpkg install pango freetype
      - name: Install vglyph
        run: v install vglyph
      - name: Checkout the gui module
        uses: actions/checkout@v4
        with:
          path: gui
      - name: Run tests
        run: v -cc msvc test gui/
      - name: Check compilation of examples
        run: v -cc msvc should-compile-all gui/examples/
      - name: Check compilation of examples with -W
        run: v -cc msvc gui/examples/_build.vsh
