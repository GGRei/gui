name: Windows Native Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - windows-native-smoke
    paths:
      - "**.v"
      - "**.vsh"
      - "**.c"
      - "**.h"
      - "**.m"
      - ".github/workflows/ci.yml"
      - ".github/workflows/windows-native-smoke.yml"
  pull_request:
    branches:
      - windows-native-smoke
    paths:
      - "**.v"
      - "**.vsh"
      - "**.c"
      - "**.h"
      - "**.m"
      - ".github/workflows/ci.yml"
      - ".github/workflows/windows-native-smoke.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  V_VERSION: 0.5.1

jobs:
  msvc:
    name: MSVC native smoke
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Install V
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $asset = 'v_windows.zip'
          $url = "https://github.com/vlang/v/releases/download/$env:V_VERSION/$asset"
          Invoke-WebRequest -Uri $url -OutFile $asset
          Expand-Archive -Path $asset -DestinationPath . -Force
          $vPath = (Resolve-Path .\v).Path
          Add-Content -Path $env:GITHUB_PATH -Value $vPath
      - name: Verify V version
        shell: pwsh
        run: |
          $vVersion = v version
          Write-Host $vVersion
          if ($vVersion -notlike "*$env:V_VERSION*") {
            throw "Expected V version $env:V_VERSION"
          }
      - name: Install pango and freetype
        run: vcpkg install pango freetype
      - name: Install vglyph
        run: v install vglyph
      - name: Checkout gui
        uses: actions/checkout@v4
        with:
          path: gui
      - name: Run noninteractive native tests
        run: >
          v -no-parallel -cc msvc test
          gui/_native_dialog_test.v
          gui/_native_print_test.v
          gui/_native_notification_test.v
          gui/nativebridge/_bridge_ex_test.v
          gui/nativebridge/_readback_abi_test.v
      - name: Compile native smoke examples
        run: |
          v -no-parallel -cc msvc -W -o dialogs_smoke.exe gui/examples/dialogs.v
          v -no-parallel -cc msvc -W -o printing_smoke.exe gui/examples/printing.v
          v -no-parallel -cc msvc -W -o notification_smoke.exe gui/examples/native_notification.v

  clang:
    name: Clang native smoke (exploratory)
    runs-on: windows-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - name: Install V
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $asset = 'v_windows.zip'
          $url = "https://github.com/vlang/v/releases/download/$env:V_VERSION/$asset"
          Invoke-WebRequest -Uri $url -OutFile $asset
          Expand-Archive -Path $asset -DestinationPath . -Force
          $vPath = (Resolve-Path .\v).Path
          Add-Content -Path $env:GITHUB_PATH -Value $vPath
      - name: Verify V version
        shell: pwsh
        run: |
          $vVersion = v version
          Write-Host $vVersion
          if ($vVersion -notlike "*$env:V_VERSION*") {
            throw "Expected V version $env:V_VERSION"
          }
      - name: Install pango and freetype
        run: vcpkg install pango freetype
      - name: Install vglyph
        run: v install vglyph
      - name: Checkout gui
        uses: actions/checkout@v4
        with:
          path: gui
      - name: Run noninteractive native tests
        run: >
          v -no-parallel -cc clang test
          gui/_native_dialog_test.v
          gui/_native_print_test.v
          gui/_native_notification_test.v
          gui/nativebridge/_bridge_ex_test.v
          gui/nativebridge/_readback_abi_test.v
      - name: Compile native smoke examples
        run: |
          v -no-parallel -cc clang -W -o dialogs_smoke.exe gui/examples/dialogs.v
          v -no-parallel -cc clang -W -o printing_smoke.exe gui/examples/printing.v
          v -no-parallel -cc clang -W -o notification_smoke.exe gui/examples/native_notification.v

  mingw:
    name: MinGW native smoke (exploratory)
    runs-on: windows-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - name: Install V
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $asset = 'v_windows.zip'
          $url = "https://github.com/vlang/v/releases/download/$env:V_VERSION/$asset"
          Invoke-WebRequest -Uri $url -OutFile $asset
          Expand-Archive -Path $asset -DestinationPath . -Force
          $vPath = (Resolve-Path .\v).Path
          Add-Content -Path $env:GITHUB_PATH -Value $vPath
      - name: Verify V version
        shell: pwsh
        run: |
          $vVersion = v version
          Write-Host $vVersion
          if ($vVersion -notlike "*$env:V_VERSION*") {
            throw "Expected V version $env:V_VERSION"
          }
      - name: Install MSYS2 MinGW dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-pango
            mingw-w64-x86_64-freetype
      - name: Verify V version in MSYS2
        shell: msys2 {0}
        run: |
          v_version="$(v version)"
          echo "$v_version"
          case "$v_version" in
            *"$V_VERSION"*) ;;
            *)
              echo "Expected V version $V_VERSION"
              exit 1
              ;;
          esac
      - name: Install vglyph
        shell: msys2 {0}
        run: v install vglyph
      - name: Checkout gui
        uses: actions/checkout@v4
        with:
          path: gui
      - name: Run noninteractive native tests
        shell: msys2 {0}
        run: >
          v -no-parallel -cc gcc test
          gui/_native_dialog_test.v
          gui/_native_print_test.v
          gui/_native_notification_test.v
          gui/nativebridge/_bridge_ex_test.v
          gui/nativebridge/_readback_abi_test.v
      - name: Compile native smoke examples
        shell: msys2 {0}
        run: |
          v -no-parallel -cc gcc -W -o dialogs_smoke.exe gui/examples/dialogs.v
          v -no-parallel -cc gcc -W -o printing_smoke.exe gui/examples/printing.v
          v -no-parallel -cc gcc -W -o notification_smoke.exe gui/examples/native_notification.v
